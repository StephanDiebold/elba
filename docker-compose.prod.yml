services:
  elba-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        Build_Mode: "production"
        VITE_API_BASE_URL: "https://elba-api.diebold.gmbh"
    image: elba-frontend:prod
    container_name: elba-frontend
    environment:
      VITE_API_BASE_URL: "https://elba-api.diebold.gmbh"
    networks:
      - infra_net
    restart: unless-stopped

  elba-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: elba-backend:prod
    container_name: elba-backend
    env_file: .env.prod
    networks:
      - infra_net
    restart: unless-stopped

networks:
  infra_net:
    external: true
