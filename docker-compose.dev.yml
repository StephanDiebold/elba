version: "3.9"
services:
  mariadb:
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=elba
      - MARIADB_USER=elba
      - MARIADB_PASSWORD=elba
    ports: ["3306:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  elba-backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    env_file: .env.dev
    environment:
      - ENV=dev
    depends_on: { mariadb: { condition: service_healthy } }
    ports: ["8000:8000"]
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  elba-frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    env_file: .env.dev
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  adminer:
    image: adminer
    ports: ["8080:8080"]
